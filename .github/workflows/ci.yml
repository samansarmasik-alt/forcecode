name: ForgeCode CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: forgecode-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Check syntax
        run: python -m py_compile forgecode.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check CLI entry point
        run: python forgecode.py --version

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check syntax
        run: python -m py_compile forgecode.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check Windows launcher
        shell: cmd
        run: forgecode.bat --version
